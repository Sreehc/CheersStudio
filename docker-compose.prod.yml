name: cheersstudio-prod

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sreehc/cheersstudio-backend}:${BACKEND_IMAGE_TAG:-main}
    container_name: cheersstudio-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://studio.wandcheers.xyz}
      ALIYUN_OSS_ENABLED: ${ALIYUN_OSS_ENABLED:-false}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-oss-cn-beijing.aliyuncs.com}
      ALIYUN_OSS_REGION: ${ALIYUN_OSS_REGION:-cn-beijing}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_OSS_OBJECT_PREFIX: ${ALIYUN_OSS_OBJECT_PREFIX:-cheers-studio}
      ALIYUN_OSS_PUBLIC_URL_PREFIX: ${ALIYUN_OSS_PUBLIC_URL_PREFIX:-}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8081}:8080"
    networks:
      - cheersstudio_net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/sreehc/cheersstudio-frontend}:${FRONTEND_IMAGE_TAG:-main}
    container_name: cheersstudio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8089}:3000"
    networks:
      - cheersstudio_net

networks:
  cheersstudio_net:
    name: cheersstudio_net