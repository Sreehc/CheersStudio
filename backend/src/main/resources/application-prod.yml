spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    com.cheersstudio: INFO

aliyun:
  oss:
    enabled: ${ALIYUN_OSS_ENABLED:false}
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    region: ${ALIYUN_OSS_REGION:cn-beijing}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:cheers-studio}
    public-url-prefix: ${ALIYUN_OSS_PUBLIC_URL_PREFIX:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://studio.wandcheers.xyz}